name: worknet
description: Passive proximity networking for tech events.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Proximity / BLE ──────────────────────────────────────────────
  flutter_blue_plus: ^1.32.12         # Fallback BLE impl
  permission_handler: ^11.3.1

  # ── State Management ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local Storage ────────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1         # Includes native Isar libs
  hive_flutter: ^1.1.0                # Lightweight KV (prefs, flags)

  # ── Navigation ───────────────────────────────────────────────────
  go_router: ^13.2.5

  # ── UI / Design ──────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # ── Utilities ────────────────────────────────────────────────────
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3

  # ── QR (Phase 2) ─────────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  isar_generator: ^3.1.0+1
  flutter_nearby_connections: ^1.1.2
  build_runner: ^2.4.13
  device_info_plus: ^13.0.0

  # ── Firebase (Phase 2 — commented out until needed) ──────────────
  # firebase_core: ^2.x
  # firebase_auth: ^4.x
  # cloud_firestore: ^4.x
  # firebase_crashlytics: ^3.x

  # ── Crypto / Signing (Phase 2) ───────────────────────────────────
  # pointycastle: ^3.x

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
  assets:
    - assets/fonts/
    - assets/images/
    - assets/animations/
